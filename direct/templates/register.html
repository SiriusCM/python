<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>注册 - Twitter Clone</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css">
    <link rel="stylesheet" href="/static/css/register.css">
</head>
<body>
    <div class="container">
        <div class="logo">
            <i class="ri-twitter-x-line"></i>
            <h1>Twitter Clone</h1>
        </div>
        <div class="auth-card">
            <h2>注册</h2>
            <p class="subtitle">创建你的账号</p>
            <div class="form-group">
                <label>用户名</label>
                <input type="text" id="regUsername" placeholder="请输入用户名">
            </div>
            <div class="form-group">
                <label>邮箱</label>
                <input type="email" id="regEmail" placeholder="请输入邮箱">
            </div>
            <div class="form-group">
                <label>昵称（可选）</label>
                <input type="text" id="regNickname" placeholder="请输入昵称">
            </div>
            <div class="form-group">
                <label>密码</label>
                <input type="password" id="regPassword" placeholder="请输入密码">
            </div>
            <button class="btn" onclick="register()">注册</button>
            <p class="switch-auth">
                已有账号？<a href="/login">立即登录</a>
            </p>
        </div>
    </div>

    <div class="toast" id="toast"></div>
    <script src="/static/js/register.js"></script>
</body>
</html>
